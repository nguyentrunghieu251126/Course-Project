<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>THT Tech - Đăng nhập</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="signin.css">
</head>

<body>

  <!-- Glow -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <div class="container py-4 position-relative z-1">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar px-4">

      <a class="navbar-brand logo d-flex align-items-center gap-2" href="#">
        <i class="fa-solid fa-mobile-screen"></i>
        <span>THT TECH</span>
      </a>

      <button
        class="navbar-toggler border-0 shadow-none"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarContent"
      >
        <i class="fa-solid fa-bars"></i>
      </button>

      <div class="collapse navbar-collapse" id="navbarContent">

        <ul class="navbar-nav mx-auto gap-lg-4">

          <li class="nav-item">
            <a class="nav-link" href="/index.html">Trang chủ</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Sản phẩm</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Hỗ trợ</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">Liên hệ</a>
          </li>

        </ul>

      </div>
    </nav>

    <!-- Login -->
    <section class="auth-wrapper d-flex justify-content-center align-items-center">

      <div class="auth-card text-center">

        <!-- Logo -->
        <div class="login-logo">
          <i class="fa-solid fa-mobile-screen"></i>
          <span>THT TECH</span>
        </div>

        <!-- Title -->
        <h1 class="auth-title">
          Đăng nhập tài khoản
        </h1>

        <!-- Subtitle -->
        <p class="auth-subtitle">
          Truy cập hệ sinh thái công nghệ THT Tech,
          theo dõi đơn hàng và cập nhật sản phẩm mới.
        </p>

        <!-- Form -->
        <form id="loginForm">

          <!-- Email -->
          <div class="input-group custom-input mb-3">

            <span class="input-group-text">
              <i class="fa-regular fa-envelope"></i>
            </span>

            <input
              type="email"
              class="form-control"
              placeholder="Email"
            >

          </div>

          <!-- Password -->
          <div class="input-group custom-input mb-2">

            <span class="input-group-text">
              <i class="fa-solid fa-lock"></i>
            </span>

            <input
              type="password"
              class="form-control"
              placeholder="Mật khẩu"
            >

          </div>

          <!-- Forgot -->
          <div class="text-end mb-4">
            <a href="#" class="forgot-link">
              Quên mật khẩu?
            </a>
          </div>

          <!-- Button -->
          <button type="submit" class="btn login-btn w-100">
            ĐĂNG NHẬP
          </button>

        </form>

        <!-- Bottom -->
        <div class="bottom-text">
          Chưa có tài khoản?
          <a href="/signup.html">Đăng ký</a>
        </div>

      </div>

    </section>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS -->
  <script src="signin.js"></script>

</body>
</html>
